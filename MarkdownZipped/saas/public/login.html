<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sign in — MarkdownZipped</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Fraunces:opsz,wght@9..144,300;9..144,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets.css">
</head><body><div class="wrap">
<header class="top"></header>
<h1>Sign in</h1>
<div class="card" style="max-width:420px">
  <form id="f">
    <label>Email</label><input name="email" type="email" autocomplete="email" required>
    <label>Password</label><input name="password" type="password" autocomplete="current-password" required>
    <div class="err" id="err"></div>
    <button class="btn primary" style="margin-top:14px;width:100%">Sign in</button>
  </form>
  <p class="muted" style="margin-top:14px">No account? <a href="/signup">Create one</a></p>
</div>
<footer><div>md.zipped / 2026</div><div><a href="/">home</a></div></footer>
</div>
<script type="module">
import {api, mountHeader, qs} from "/app.js";
await mountHeader();
document.getElementById("f").onsubmit=async(e)=>{
  e.preventDefault();
  const fd=new FormData(e.target);
  try{
    await api("/api/auth/login",{method:"POST",body:{email:fd.get("email"),password:fd.get("password")}});
    location.href = qs("next") || "/account";
  }catch(ex){ document.getElementById("err").textContent=ex.message; }
};
</script>
</body></html>
