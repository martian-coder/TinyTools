name: Test AI Proxy

# Smoke-tests the deployed Supabase ai-proxy edge function: sends a tiny
# prompt with the public anon key and asserts a sane completion comes back.

on:
  push:
    branches:
      - claude/sift-glass-milestones-cvn1uf
    paths:
      - ".github/workflows/test-ai-proxy.yml"
  workflow_dispatch:

jobs:
  test-proxy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Call the proxy with a ping prompt (both candidate slugs)
        run: |
          URL=$(grep '^VITE_SUPABASE_URL=' Strenes/.env | cut -d= -f2 | tr -d '\r')
          KEY=$(grep '^VITE_SUPABASE_ANON_KEY=' Strenes/.env | cut -d= -f2 | tr -d '\r')
          ok=""
          for slug in ai-proxy super-processor; do
            echo "── Testing $URL/functions/v1/$slug"
            code=$(curl -sS -o /tmp/resp.json -w "%{http_code}" -X POST \
              "$URL/functions/v1/$slug" \
              -H "content-type: application/json" \
              -H "apikey: $KEY" \
              -H "authorization: Bearer $KEY" \
              -d '{"system":"Reply with exactly the word PONG and nothing else.","user":"ping","maxTokens":300}')
            echo "HTTP status: $code"
            echo "Response body:"
            cat /tmp/resp.json
            echo
            if [ "$code" = "200" ] && grep -qi 'pong' /tmp/resp.json; then
              echo "✅ $slug is live and answering"
              ok="$slug"
            fi
          done
          test -n "$ok" || { echo "::error::no working proxy slug found"; exit 1; }
