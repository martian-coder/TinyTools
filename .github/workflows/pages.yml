name: Deploy to GitHub Pages

# Publishes six static surfaces:
#   /            -> MarkdownZipped/web  (the live compression studio, v1)
#   /v2/         -> static PREVIEW of the SaaS frontend (saas/public)
#   /strenes/    -> Strenes messaging-filter PWA (Strenes/)
#   /strenes-home/ -> Strenes marketing landing page (Strenes/landing/)
#   /perch/      -> Perch AI-guardian PWA (Perch/)
#   /perch-home/ -> Perch marketing landing page (Perch/landing/)
#
# Deploys ONLY from the default branch (main).

on:
  push:
    branches:
      - main
    paths:
      - "MarkdownZipped/web/**"
      - "MarkdownZipped/saas/public/**"
      - "MarkdownZipped/saas/src/plans.js"
      - "MarkdownZipped/saas/build-preview.mjs"
      - "Strenes/src/**"
      - "Strenes/public/**"
      - "Strenes/index.html"
      - "Strenes/vite.config.ts"
      - "Strenes/package.json"
      - "Strenes/landing/**"
      - "Perch/src/**"
      - "Perch/public/**"
      - "Perch/index.html"
      - "Perch/vite.config.ts"
      - "Perch/package.json"
      - "Perch/landing/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Strenes/package-lock.json

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build Strenes
        working-directory: Strenes
        # base_path is e.g. /TinyTools; append /strenes/ so assets resolve correctly.
        env:
          VITE_BASE: ${{ steps.pages.outputs.base_path }}/strenes/
        run: |
          npm ci
          npm run build

      - name: Build Perch
        working-directory: Perch
        env:
          VITE_BASE: ${{ steps.pages.outputs.base_path }}/perch/
        run: |
          npm ci
          npm run build

      - name: Assemble site
        run: |
          mkdir -p _site
          # root — MarkdownZipped live studio
          cp -r MarkdownZipped/web/. _site/
          cp MarkdownZipped/web/index.html _site/404.html
          # /v2/ — static SaaS preview
          node MarkdownZipped/saas/build-preview.mjs \
            MarkdownZipped/saas/public _site/v2
          # /strenes/ — Strenes PWA
          mkdir -p _site/strenes
          cp -r Strenes/dist/. _site/strenes/
          cp Strenes/dist/index.html _site/strenes/404.html
          # /strenes-home/ — Strenes marketing landing page
          mkdir -p _site/strenes-home
          cp -r Strenes/landing/. _site/strenes-home/
          # /perch/ — Perch AI-guardian PWA
          mkdir -p _site/perch
          cp -r Perch/dist/. _site/perch/
          cp Perch/dist/index.html _site/perch/404.html
          # /perch-home/ — Perch marketing landing page
          mkdir -p _site/perch-home
          cp -r Perch/landing/. _site/perch-home/
          # Mirror the latest release APKs as SAME-ORIGIN static files so the
          # download buttons don't rely on GitHub's cross-host release
          # redirect — flaky mobile browsers (and in-app webviews) loop on
          # that redirect but download a plain static file fine. Non-fatal:
          # a transient fetch failure must not break the whole site deploy;
          # the landing pages keep the github.com release link as a fallback.
          curl -fL --retry 3 -o _site/strenes.apk \
            https://github.com/martian-coder/TinyTools/releases/download/android-latest/strenes.apk \
            || echo "::warning::strenes.apk mirror failed"
          curl -fL --retry 3 -o _site/perch.apk \
            https://github.com/martian-coder/TinyTools/releases/download/perch-android-latest/perch.apk \
            || echo "::warning::perch.apk mirror failed"
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
