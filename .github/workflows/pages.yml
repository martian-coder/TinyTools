name: Deploy to GitHub Pages

# Publishes three static surfaces:
#   /            -> MarkdownZipped/web  (the live compression studio, v1)
#   /v2/         -> static PREVIEW of the SaaS frontend (saas/public)
#   /sift/       -> Sift messaging-filter PWA (Sift/)
#
# Deploys ONLY from the default branch (main).

on:
  push:
    branches:
      - main
    paths:
      - "MarkdownZipped/web/**"
      - "MarkdownZipped/saas/public/**"
      - "MarkdownZipped/saas/src/plans.js"
      - "MarkdownZipped/saas/build-preview.mjs"
      - "Sift/src/**"
      - "Sift/public/**"
      - "Sift/index.html"
      - "Sift/vite.config.ts"
      - "Sift/package.json"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Sift/package-lock.json

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build Sift
        working-directory: Sift
        # base_path is e.g. /TinyTools; append /sift/ so assets resolve correctly.
        env:
          VITE_BASE: ${{ steps.pages.outputs.base_path }}/sift/
        run: |
          npm ci
          npm run build

      - name: Assemble site
        run: |
          mkdir -p _site
          # root — MarkdownZipped live studio
          cp -r MarkdownZipped/web/. _site/
          cp MarkdownZipped/web/index.html _site/404.html
          # /v2/ — static SaaS preview
          node MarkdownZipped/saas/build-preview.mjs \
            MarkdownZipped/saas/public _site/v2
          # /sift/ — Sift PWA
          cp -r Sift/dist/. _site/sift/
          # SPA fallback so deep links reload correctly
          cp Sift/dist/index.html _site/sift/404.html
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
