name: Deploy MarkdownZipped studio to GitHub Pages

# Publishes two static surfaces:
#   /            -> MarkdownZipped/web  (the live compression studio, v1)
#   /v2/         -> static PREVIEW of the SaaS frontend (saas/public),
#                   generated by saas/build-preview.mjs with demo data.
#                   The real SaaS backend cannot run on Pages; this is a
#                   look-only preview, clearly banner-labeled.
#
# Deploys ONLY from the default branch (main): the github-pages
# environment's protection rule rejects non-default branches.
#
# Pages must be enabled once (cannot be scripted — GitHub blocks the
# Actions token from creating a Pages site):
#   Repo -> Settings -> Pages -> Build and deployment -> Source:
#   "GitHub Actions".

on:
  push:
    branches:
      - main
    paths:
      - "MarkdownZipped/web/**"
      - "MarkdownZipped/saas/public/**"
      - "MarkdownZipped/saas/src/plans.js"
      - "MarkdownZipped/saas/build-preview.mjs"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Never run two deployments at once; let an in-progress one finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Assemble site
        run: |
          mkdir -p _site
          # v1 — the live studio (unchanged) at the site root
          cp -r MarkdownZipped/web/. _site/
          cp MarkdownZipped/web/index.html _site/404.html
          # v2 — static SaaS preview at /v2/
          node MarkdownZipped/saas/build-preview.mjs \
            MarkdownZipped/saas/public _site/v2
          # Disable Jekyll processing (the site is plain static HTML)
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
