name: Deploy MarkdownZipped studio to GitHub Pages

# Publishes MarkdownZipped/web as the site root.
# actions/configure-pages with `enablement: true` creates the Pages site
# automatically the first time this runs (the workflow token carries
# `pages: write`), so no manual Settings step is needed unless Pages is
# disabled at the organisation/enterprise level.

on:
  push:
    branches:
      - main
      - claude/markdown-zipped-tool-XMBQF
    paths:
      - "MarkdownZipped/web/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Never run two deployments at once; let an in-progress one finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure / enable GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Assemble site
        run: |
          mkdir -p _site
          cp -r MarkdownZipped/web/. _site/
          # Friendly 404 -> studio
          cp MarkdownZipped/web/index.html _site/404.html
          # Disable Jekyll processing (the site is plain static HTML)
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
