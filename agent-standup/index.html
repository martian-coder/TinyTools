<!doctype html>
<html lang="en" data-theme="">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Standup — Live Demo</title>
<style>
/* ============================================================
   Tokens
============================================================ */
:root {
  --bg:           #0d1117;
  --surface:      #161b22;
  --surface-2:    #21262d;
  --surface-3:    #2d333b;
  --border:       #30363d;
  --border-light: #21262d;
  --text:         #e6edf3;
  --text-muted:   #8b949e;
  --text-dim:     #484f58;
  --c-update:     #3fb950;
  --c-contradict: #f85149;
  --c-question:   #c9962a;
  --c-answer:     #4c9be8;
  --c-unknown:    #bc8cff;
  --c-pass:       #484f58;
  --accent:       #4c9be8;
  --radius:       5px;
  --mono: ui-monospace,'SF Mono','Cascadia Code',Consolas,'Courier New',monospace;
  --sans: system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,sans-serif;
}
@media (prefers-color-scheme: light) {
  :root:not([data-theme="dark"]) {
    --bg:#f6f8fa; --surface:#fff; --surface-2:#f0f2f4; --surface-3:#e5e8eb;
    --border:#d0d7de; --border-light:#eaeef2;
    --text:#1f2328; --text-muted:#636c76; --text-dim:#aab0b8;
    --c-update:#1a7f37; --c-contradict:#d1242f; --c-question:#9a6700;
    --c-answer:#0969da; --c-unknown:#8250df; --c-pass:#aab0b8; --accent:#0969da;
  }
}
:root[data-theme="dark"] {
  --bg:#0d1117; --surface:#161b22; --surface-2:#21262d; --surface-3:#2d333b;
  --border:#30363d; --border-light:#21262d;
  --text:#e6edf3; --text-muted:#8b949e; --text-dim:#484f58;
  --c-update:#3fb950; --c-contradict:#f85149; --c-question:#c9962a;
  --c-answer:#4c9be8; --c-unknown:#bc8cff; --c-pass:#484f58; --accent:#4c9be8;
}
:root[data-theme="light"] {
  --bg:#f6f8fa; --surface:#fff; --surface-2:#f0f2f4; --surface-3:#e5e8eb;
  --border:#d0d7de; --border-light:#eaeef2;
  --text:#1f2328; --text-muted:#636c76; --text-dim:#aab0b8;
  --c-update:#1a7f37; --c-contradict:#d1242f; --c-question:#9a6700;
  --c-answer:#0969da; --c-unknown:#8250df; --c-pass:#aab0b8; --accent:#0969da;
}

/* ============================================================
   Reset
============================================================ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);
  font-family:var(--sans);font-size:14px;line-height:1.5}

/* ============================================================
   Shell
============================================================ */
.app{display:grid;grid-template-rows:50px 1fr;
  grid-template-columns:268px 1fr 292px;height:100vh;overflow:hidden}

/* ============================================================
   Header
============================================================ */
.header{grid-column:1/-1;display:flex;align-items:center;gap:12px;
  padding:0 16px;border-bottom:1px solid var(--border);background:var(--surface)}

.logo{font-family:var(--mono);font-size:11px;font-weight:700;
  letter-spacing:.18em;text-transform:uppercase;display:flex;align-items:center}
.logo-mark{display:inline-block;width:7px;height:7px;background:var(--c-contradict);
  border-radius:1px;margin:0 4px}

.vsep{width:1px;height:16px;background:var(--border)}

.status-row{display:flex;align-items:center;gap:6px;
  font-family:var(--mono);font-size:10.5px;color:var(--text-muted)}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--text-dim);flex-shrink:0}
.status-dot.live{background:var(--c-update);animation:pulse 2s ease infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(63,185,80,.4)}
  50%{box-shadow:0 0 0 4px rgba(63,185,80,0)}}

.demo-badge{font-family:var(--mono);font-size:9px;font-weight:700;
  letter-spacing:.12em;text-transform:uppercase;padding:2px 7px;
  background:rgba(201,150,42,.15);color:var(--c-question);
  border:1px solid rgba(201,150,42,.3);border-radius:3px}

.header-right{margin-left:auto;display:flex;align-items:center;gap:8px}

.counter-strip{display:flex;gap:10px;font-family:var(--mono);font-size:9.5px;
  color:var(--text-dim);font-variant-numeric:tabular-nums}
.counter-item{display:flex;gap:4px;align-items:center}
.counter-pip{width:5px;height:5px;border-radius:50%}

.speed-ctrl{display:flex;gap:2px;align-items:center;
  font-family:var(--mono);font-size:10px;color:var(--text-dim)}
.speed-btn{background:none;border:1px solid transparent;border-radius:3px;
  color:var(--text-dim);padding:2px 6px;font-family:var(--mono);font-size:10px;
  cursor:pointer;transition:all .1s}
.speed-btn:hover{color:var(--text);border-color:var(--border)}
.speed-btn.active{color:var(--text);border-color:var(--border);
  background:var(--surface-2)}

.btn-sm{background:var(--surface-2);border:1px solid var(--border);
  color:var(--text-muted);border-radius:var(--radius);padding:3px 9px;
  font-size:11px;font-family:var(--mono);cursor:pointer;transition:all .15s}
.btn-sm:hover{color:var(--text);border-color:var(--text-dim)}

/* ============================================================
   Left — Ledger
============================================================ */
.panel-ledger{grid-row:2;border-right:1px solid var(--border);
  overflow-y:auto;background:var(--surface)}

.panel-head{position:sticky;top:0;padding:8px 14px;
  font-family:var(--mono);font-size:9.5px;font-weight:700;
  letter-spacing:.14em;text-transform:uppercase;color:var(--text-dim);
  background:var(--surface);border-bottom:1px solid var(--border-light);z-index:2}

.agent-group{border-bottom:1px solid var(--border-light)}
.agent-toggle{display:flex;align-items:center;gap:8px;padding:7px 14px;
  cursor:pointer;user-select:none;transition:background .1s}
.agent-toggle:hover{background:var(--surface-2)}
.agent-pip{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.agent-role{font-family:var(--mono);font-size:9.5px;font-weight:600;
  letter-spacing:.06em;text-transform:uppercase;color:var(--text-muted);flex:1}
.agent-n{font-family:var(--mono);font-size:9px;color:var(--text-dim)}
.chevron{font-size:8px;color:var(--text-dim);transition:transform .15s}
.chevron.open{transform:rotate(90deg)}

.agent-facts{padding-bottom:4px}
.agent-facts.collapsed{display:none}

.ledger-row{padding:5px 14px 5px 28px;border-left:2px solid transparent;
  transition:background .2s,border-left-color .2s}
.ledger-row.cited{background:rgba(188,140,255,.07);border-left-color:var(--c-unknown);
  animation:cite-flash .5s ease}
@keyframes cite-flash{0%{background:rgba(188,140,255,.22)}100%{background:rgba(188,140,255,.07)}}
.ledger-fact{font-size:11.5px;color:var(--text-muted);line-height:1.42;margin-bottom:2px}
.ledger-ref{font-family:var(--mono);font-size:9px;color:var(--text-dim)}

/* personality link */
.personality-link{display:flex;align-items:center;gap:5px;
  padding:5px 14px 5px 28px;
  font-family:var(--mono);font-size:9px;color:var(--text-dim);
  cursor:pointer;text-decoration:none;border-bottom:1px solid var(--border-light)}
.personality-link:hover{color:var(--text-muted)}

/* ============================================================
   Center — Transcript
============================================================ */
.panel-transcript{grid-row:2;display:flex;flex-direction:column;overflow:hidden}

.transcript-scroll{flex:1;overflow-y:auto;padding:18px 22px;scroll-behavior:smooth}

.round-divider{display:flex;align-items:center;gap:10px;margin:18px 0 12px}
.round-divider::before,.round-divider::after{content:'';flex:1;height:1px;background:var(--border)}
.round-label{font-family:var(--mono);font-size:9px;font-weight:700;
  letter-spacing:.18em;text-transform:uppercase;color:var(--text-dim)}

/* turns */
.turn{margin-bottom:8px;border-radius:var(--radius);
  border:1px solid var(--border);border-left:3px solid var(--border);
  background:var(--surface);overflow:hidden;
  opacity:0;transform:translateY(5px);animation:ti .22s ease forwards}
@keyframes ti{to{opacity:1;transform:translateY(0)}}
@media (prefers-reduced-motion:reduce){.turn{animation:none;opacity:1;transform:none}}
.turn:hover{background:var(--surface-2)}
.turn[data-kind="update"]    {border-left-color:var(--c-update)}
.turn[data-kind="contradict"]{border-left-color:var(--c-contradict)}
.turn[data-kind="question"]  {border-left-color:var(--c-question)}
.turn[data-kind="answer"]    {border-left-color:var(--c-answer)}
.turn[data-kind="unknown"]   {border-left-color:var(--c-unknown);
  background:linear-gradient(135deg,rgba(188,140,255,.04) 0%,transparent 55%)}
.turn[data-kind="pass"]      {border-left-color:var(--c-pass);opacity:.45}
.turn[data-kind="unknown"]::after{content:'';display:block;height:1px;
  background:repeating-linear-gradient(90deg,var(--c-unknown) 0,var(--c-unknown) 5px,
    transparent 5px,transparent 10px);opacity:.3}

.turn-head{display:flex;align-items:center;gap:7px;padding:6px 11px;
  border-bottom:1px solid var(--border-light)}
.turn-speaker{font-family:var(--mono);font-size:9.5px;font-weight:700;
  letter-spacing:.08em;text-transform:uppercase}
.kind-pill{font-family:var(--mono);font-size:8.5px;font-weight:700;
  letter-spacing:.08em;text-transform:uppercase;padding:1px 6px;border-radius:3px}
.p-update    {background:rgba(63,185,80,.14); color:var(--c-update)}
.p-contradict{background:rgba(248,81,73,.14); color:var(--c-contradict)}
.p-question  {background:rgba(201,150,42,.14);color:var(--c-question)}
.p-answer    {background:rgba(76,155,232,.12);color:var(--c-answer)}
.p-unknown   {background:rgba(188,140,255,.14);color:var(--c-unknown)}
.p-pass      {background:var(--surface-2);    color:var(--text-dim)}
.turn-round{margin-left:auto;font-family:var(--mono);font-size:9px;color:var(--text-dim)}

.turn-body{padding:9px 11px}
.turn-text{font-size:13px;line-height:1.55;color:var(--text)}
.turn[data-kind="pass"] .turn-text{font-size:11.5px;color:var(--text-dim);font-style:italic}

.cursor-blink{display:inline-block;width:2px;height:1em;background:var(--accent);
  vertical-align:text-bottom;margin-left:1px;animation:blink .75s step-end infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

.unknown-callout{display:flex;align-items:center;gap:6px;margin-top:8px;
  padding:5px 8px;background:rgba(188,140,255,.07);border-radius:3px;
  font-family:var(--mono);font-size:9.5px;color:var(--c-unknown);letter-spacing:.04em}

.basis-receipt{margin-top:9px;padding:7px 10px;
  background:rgba(248,81,73,.05);border-left:2px solid rgba(248,81,73,.3);
  border-radius:0 3px 3px 0}
.basis-eyebrow{font-family:var(--mono);font-size:8.5px;font-weight:700;
  letter-spacing:.14em;text-transform:uppercase;
  color:var(--c-contradict);opacity:.65;margin-bottom:3px}
.basis-body{font-size:11.5px;color:var(--text-muted);line-height:1.44}

.transcript-foot{border-top:1px solid var(--border);background:var(--surface);
  padding:6px 22px;min-height:32px;font-family:var(--mono);font-size:10px;
  color:var(--text-dim);display:flex;align-items:center;gap:12px}

/* ============================================================
   Right — Briefings
============================================================ */
.panel-briefings{grid-row:2;border-left:1px solid var(--border);
  overflow-y:auto;background:var(--surface);display:flex;flex-direction:column}

.briefings-placeholder{flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:8px;
  color:var(--text-dim);font-family:var(--mono);font-size:9.5px;text-align:center;padding:24px}
.lock-icon{font-size:28px;opacity:.2}

.briefing-card{margin:10px 10px 0;border:1px solid var(--border);
  border-radius:var(--radius);overflow:hidden;
  opacity:0;transform:translateX(10px);animation:ci .28s ease forwards}
@keyframes ci{to{opacity:1;transform:translateX(0)}}

.briefing-card-head{display:flex;align-items:center;gap:7px;padding:7px 10px;
  background:var(--surface-2);border-bottom:1px solid var(--border)}
.briefing-pip{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.briefing-role{font-family:var(--mono);font-size:9px;font-weight:700;
  letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);flex:1}
.private-tag{font-family:var(--mono);font-size:8px;color:var(--text-dim);
  letter-spacing:.1em;text-transform:uppercase}
.briefing-body{padding:10px;font-size:12px;color:var(--text-muted);
  line-height:1.55;white-space:pre-wrap}

/* modal */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.7);
  z-index:100;display:flex;align-items:center;justify-content:center;
  opacity:0;animation:fade-in .2s ease forwards}
@keyframes fade-in{to{opacity:1}}
.modal{background:var(--surface);border:1px solid var(--border);
  border-radius:8px;width:min(600px,90vw);max-height:80vh;
  overflow:hidden;display:flex;flex-direction:column}
.modal-head{display:flex;align-items:center;gap:10px;
  padding:12px 16px;border-bottom:1px solid var(--border)}
.modal-pip{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.modal-title{font-family:var(--mono);font-size:11px;font-weight:700;
  letter-spacing:.1em;text-transform:uppercase;flex:1;color:var(--text-muted)}
.modal-close{background:none;border:none;color:var(--text-dim);
  cursor:pointer;font-size:16px;line-height:1;padding:2px 4px}
.modal-close:hover{color:var(--text)}
.modal-body{padding:20px;overflow-y:auto;font-size:13px;line-height:1.65;color:var(--text-muted)}
.modal-body h1,.modal-body h2{font-family:var(--mono);font-size:10px;
  font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  color:var(--text-dim);margin-bottom:8px;margin-top:16px}
.modal-body h1:first-child{margin-top:0;font-size:12px;color:var(--text-muted)}
.modal-body p{margin-bottom:10px}
.modal-body ul{padding-left:18px;margin-bottom:10px}
.modal-body li{margin-bottom:4px}
.modal-body code{font-family:var(--mono);font-size:11px;
  background:var(--surface-2);padding:1px 4px;border-radius:3px}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:8px}

@media (max-width:860px){
  .app{grid-template-columns:1fr}
  .panel-ledger,.panel-briefings{display:none}
}
</style>
</head>
<body>
<div class="app">

<!-- ================================================================= -->
<!-- Header                                                             -->
<!-- ================================================================= -->
<header class="header">
  <div class="logo">AGENT<span class="logo-mark"></span>STANDUP</div>
  <div class="vsep"></div>
  <div class="status-row">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Ready</span>
  </div>
  <span class="demo-badge">DEMO</span>
  <div class="header-right">
    <div class="counter-strip" id="ctrStrip" style="display:none">
      <div class="counter-item">
        <div class="counter-pip" style="background:var(--c-contradict)"></div>
        <span id="ctr-c">0</span>&nbsp;contradict
      </div>
      <div class="counter-item">
        <div class="counter-pip" style="background:var(--c-unknown)"></div>
        <span id="ctr-u">0</span>&nbsp;unknown
      </div>
      <div class="counter-item">
        <div class="counter-pip" style="background:var(--c-question)"></div>
        <span id="ctr-q">0</span>&nbsp;question
      </div>
    </div>
    <div class="speed-ctrl">
      <button class="speed-btn active" onclick="setSpeed(1,this)">1&times;</button>
      <button class="speed-btn" onclick="setSpeed(2,this)">2&times;</button>
      <button class="speed-btn" onclick="setSpeed(4,this)">4&times;</button>
    </div>
    <button class="btn-sm" id="replayBtn" style="display:none" onclick="replay()">&#8634; Replay</button>
    <button class="btn-sm" onclick="toggleTheme()">&#11041; theme</button>
  </div>
</header>

<!-- ================================================================= -->
<!-- Left: Ledger                                                       -->
<!-- ================================================================= -->
<aside class="panel-ledger">
  <div class="panel-head">Private Ledgers</div>
  <div id="ledgerContent"></div>
</aside>

<!-- ================================================================= -->
<!-- Center: Transcript                                                 -->
<!-- ================================================================= -->
<main class="panel-transcript">
  <div class="transcript-scroll" id="transcriptScroll">
    <div id="transcriptLive"></div>
  </div>
  <div class="transcript-foot" id="foot"></div>
</main>

<!-- ================================================================= -->
<!-- Right: Briefings                                                   -->
<!-- ================================================================= -->
<aside class="panel-briefings">
  <div class="panel-head">Private Briefings</div>
  <div id="briefingsContent" style="display:flex;flex-direction:column;flex:1">
    <div class="briefings-placeholder" id="briefPlaceholder">
      <div class="lock-icon">&#128274;</div>
      <div>Sealed until<br>meeting ends</div>
    </div>
  </div>
</aside>

</div>

<!-- Personality modal -->
<div id="modalBackdrop" style="display:none" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-head">
      <div class="modal-pip" id="modalPip"></div>
      <div class="modal-title" id="modalTitle"></div>
      <button class="modal-close" onclick="document.getElementById('modalBackdrop').style.display='none'">&#x2715;</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
/* ============================================================
   Demo data
============================================================ */
const UPDATE_TEXT = `Q1 Engineering Infrastructure Update — Payments Migration & Platform Health

We are on track to complete the payments infrastructure migration by end of Q2. The 3DS2 strong authentication upgrade is scheduled for the February release cycle and represents a significant compliance win. Our API platform has been stable, maintaining P95 latency within SLO bounds for the past 30 days. The SOC2 Type II audit is planned for the second half of this year, giving us ample runway to complete all access reviews. Data pipeline reliability has been excellent at 99.8% event capture since October, and the machine learning feature store is ready to support the upcoming personalization rollout in Q2. No critical security findings are outstanding from our most recent penetration test. The database cluster migration is proceeding on schedule, with full cutover expected by March 15.`;

const AGENTS = [
  {
    id: 'billing', role: 'Billing Service Owner', color: '#bc8cff',
    personality: {
      title: 'Billing Service Owner',
      sections: [
        ['Perspective', 'You own the revenue pipeline. When someone says "on track" or "Q2," you hear a contract date that may or may not exist. You think in renewals, service windows, and processor agreements — things with dollar signs attached. You are financially accountable, and that is a different thing from being paranoid.'],
        ['Voice', 'Terse. No hedging. No throat-clearing. Lead with the specific fact that contradicts the claim, not with "actually" or "I\'m concerned that."

Examples:
• "The 3DS2 rollback happened January 8th — not scheduled for February."
• "Contract renewal is March 12th. Late renewal triggers a 48-hour service window."
• "That release is dead until we understand what caused the 23% abandonment spike."'],
        ['What you notice first', 'Contract renewal dates. Payment processor dependency claims. Pricing changes not in the revenue model. Rollback states of payment features. Any update that says "scheduled for" a date you know to be wrong.'],
      ]
    },
    ledger: [
      { fact: 'The 3DS2 strong authentication integration was rolled back on 2024-01-08 due to a 23% cart abandonment spike in the first 6 hours of rollout', ref: 'INC-2024-0021', date: '2024-01-08', source: 'incident' },
      { fact: 'Payment processor contract renewal is due 2024-03-12, not Q2; late renewal triggers a 48-hour service interruption window', ref: 'BILL-4471', date: '2024-01-03', source: 'ticket' },
      { fact: "Stripe's updated enterprise pricing adds 0.15% to transactions over $10,000 effective 2024-02-01, not reflected in the Q1 revenue model", ref: 'BILL-4490', date: '2024-01-12', source: 'ticket' },
      { fact: 'The idempotency key fix in v2.8.1 applies only to new transaction records, not to retries of transactions created before 2024-01-01', ref: 'BILL-4483', date: '2024-01-05', source: 'ticket' },
    ]
  },
  {
    id: 'platform', role: 'Platform & Infrastructure Owner', color: '#4c9be8',
    personality: {
      title: 'Platform & Infrastructure Owner',
      sections: [
        ['Perspective', 'You own the substrate that everything runs on. When someone calls the platform "stable," you check that claim against your SLO dashboards and incident log. You have the actual numbers. You are not interested in characterizations — you are interested in whether P95 is inside or outside threshold, and for how many consecutive days.'],
        ['Voice', 'Operationally precise. Always give the number when you have it. Always give the duration. Always name the root cause if known.

Examples:
• "P95 has been at or above 287ms for eleven consecutive days against a 250ms SLO."
• "The failover drill found a 4-minute blind spot during leader election — alerting doesn\'t fire until the new leader is confirmed."
• "Redis is at 23% headroom. Six weeks to saturation at current growth."'],
        ['What you notice first', 'SLO breaches and their duration. Incident timelines and what was learned. Capacity figures (headroom, saturation dates). Upgrade blockers. Monitoring gaps. Anything a cutover plan implies that the actual infrastructure state doesn\'t support.'],
      ]
    },
    ledger: [
      { fact: "P95 API latency has exceeded the SLO threshold of 250ms continuously for 11 days as of 2024-01-15, triggered by the Q4 schema migration's unindexed join", ref: 'SLO-API-002', date: '2024-01-15', source: 'slo' },
      { fact: 'The database failover drill on 2024-01-10 revealed a 4-minute monitoring blind spot during leader election; alerting does not fire until a new leader is confirmed', ref: 'INC-2024-0020', date: '2024-01-10', source: 'postmortem' },
      { fact: 'Redis cluster memory headroom is at 23%; at current growth rate the cluster reaches saturation in approximately 6 weeks', ref: 'PLAT-2201', date: '2024-01-14', source: 'ticket' },
      { fact: 'The Kubernetes cluster upgrade to 1.28 is blocked by a CNI plugin incompatibility; estimated unblock is March at earliest', ref: 'INC-2024-0019', date: '2024-01-11', source: 'incident' },
    ]
  },
  {
    id: 'security', role: 'Security & Compliance Owner', color: '#c9962a',
    personality: {
      title: 'Security & Compliance Owner',
      sections: [
        ['Perspective', 'You work in scope, findings, and timelines. You know that a finding left open is a liability, that an audit window has a hard open date regardless of the roadmap, and that PCI scope expansions must be communicated to the audit firm — or the audit fails. These are regulatory facts, not opinions.'],

/* ============================================================
   State
============================================================ */
let speed = 1;
let playing = false;
let counters = {c:0, u:0, q:0};
let currentRound = 0;

const agentMap = {};
AGENTS.forEach(a => agentMap[a.id] = a);

/* ============================================================
   Theme
============================================================ */
function toggleTheme() {
  const root = document.documentElement;
  const cur  = root.getAttribute('data-theme') ||
    (matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light');
  root.setAttribute('data-theme', cur === 'dark' ? 'light' : 'dark');
}

/* ============================================================
   Speed
============================================================ */
function setSpeed(s, btn) {
  speed = s;
  document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

/* ============================================================
   Ledger panel
============================================================ */
function buildLedger() {
  const el = document.getElementById('ledgerContent');
  el.innerHTML = '';
  AGENTS.forEach(agent => {
    const gid = 'ag-' + agent.id;
    const g = document.createElement('div');
    g.className = 'agent-group';
    g.innerHTML = `
      <div class="agent-toggle" onclick="toggleGroup('${gid}',this)">
        <div class="agent-pip" style="background:${agent.color}"></div>
        <span class="agent-role">${esc(agent.role)}</span>
        <span class="agent-n">${agent.ledger.length}</span>
        <span class="chevron open">&#9658;</span>
      </div>
      <div class="agent-facts" id="${gid}">
        <a class="personality-link" onclick="showPersonality('${agent.id}')" href="javascript:void(0)">
          <span style="color:${agent.color};font-size:10px">&#9672;</span> Character profile
        </a>
        ${agent.ledger.map(e => `
          <div class="ledger-row" id="lr-${esc(e.ref)}">
            <div class="ledger-fact">${esc(e.fact)}</div>
            <div class="ledger-ref">${esc(e.ref)} &middot; ${esc(e.date)} &middot; ${esc(e.source)}</div>
          </div>`).join('')}
      </div>`;
    el.appendChild(g);
  });
}

function toggleGroup(id, hdr) {
  const el = document.getElementById(id);
  const ch = hdr.querySelector('.chevron');
  el.classList.toggle('collapsed');
  ch.classList.toggle('open', !el.classList.contains('collapsed'));
}

/* ============================================================
   Personality modal
============================================================ */
function showPersonality(agentId) {
  const agent = agentMap[agentId];
  if (!agent) return;
  document.getElementById('modalPip').style.background = agent.color;
  document.getElementById('modalTitle').textContent = agent.role + ' — Character Profile';

  let html = '';
  agent.personality.sections.forEach(([heading, body]) => {
    html += `<h2>${esc(heading)}</h2><p>${esc(body).replace(/\n&bull;/g, '<br>&bull;').replace(/\n/g,'<br>')}</p>`;
  });
  document.getElementById('modalBody').innerHTML = html;
  document.getElementById('modalBackdrop').style.display = 'flex';
}

function closeModal(e) {
  if (e.target === document.getElementById('modalBackdrop'))
    document.getElementById('modalBackdrop').style.display = 'none';
}

/* ============================================================
   Playback engine
============================================================ */
function wait(ms) {
  return new Promise(res => setTimeout(res, ms / speed));
}

async function playDemo() {
  playing = true;
  setStatus('live', 'Meeting in progress…');
  document.getElementById('ctrStrip').style.display = 'flex';

  for (const turn of TURNS) {
    if (!playing) return;
    const textLen = renderTurn(turn);
    const revealMs = (textLen * (turn.kind === 'update' ? 4 : 12));
    await wait(revealMs + 700);
  }

  await wait(1600);
  setFoot('Generating private briefings…');

  for (const b of BRIEFINGS) {
    if (!playing) return;
    await wait(900);
    renderBriefing(b);
  }

  await wait(1000);
  setStatus('', 'Meeting complete.');
  document.getElementById('replayBtn').style.display = 'inline-block';
}

/* ============================================================
   Turn renderer
============================================================ */
const PILL = {
  update:    ['&#8599; UPDATE',     'p-update'],
  contradict:['&#9889; CONTRADICT', 'p-contradict'],
  question:  ['? QUESTION',   'p-question'],
  answer:    ['&#8617; ANSWER',     'p-answer'],
  unknown:   ['&#9670; UNKNOWN',    'p-unknown'],
  pass:      ['&mdash; PASS',       'p-pass'],
};

function renderTurn(turn) {
  const live = document.getElementById('transcriptLive');

  if (turn.round > currentRound && turn.kind !== 'pass') {
    currentRound = turn.round;
    const d = document.createElement('div');
    d.className = 'round-divider';
    d.innerHTML = `<span class="round-label">Round ${turn.round}</span>`;
    live.appendChild(d);
  }

  const agent = agentMap[turn.speaker];
  const speakerColor = agent ? agent.color : 'var(--text-muted)';
  const [pillLabel, pillCls] = PILL[turn.kind] || [turn.kind, ''];
  const roundBadge = turn.round > 0 ? `<span class="turn-round">R${turn.round}</span>` : '';

  const el = document.createElement('div');
  el.className = 'turn';
  el.dataset.kind = turn.kind;

  const txtId = 'tt-' + turn.id;
  el.innerHTML = `
    <div class="turn-head">
      <span class="turn-speaker" style="color:${speakerColor}">${esc(turn.label).toUpperCase()}</span>
      <span class="kind-pill ${pillCls}">${pillLabel}</span>
      ${roundBadge}
    </div>
    <div class="turn-body">
      <div class="turn-text" id="${txtId}"></div>
      ${turn.kind === 'unknown' ? `<div class="unknown-callout">&#9670; &nbsp;This information is absent from the update. This is the finding.</div>` : ''}
      ${turn.kind === 'contradict' && turn.basis ? `
        <div class="basis-receipt">
          <div class="basis-eyebrow">Ledger Basis</div>
          <div class="basis-body">${esc(turn.basis)}</div>
        </div>` : ''}
    </div>`;

  live.appendChild(el);

  const textEl = document.getElementById(txtId);
  const displayText = turn.kind === 'pass' ? '—' : turn.text;
  if (turn.kind === 'pass') {
    textEl.textContent = '—';
  } else {
    revealText(textEl, displayText, turn.kind === 'update' ? 4 : 12);
  }

  if (turn.kind === 'contradict' && turn.basis) highlightLedger(turn.basis);

  if (turn.kind === 'contradict') bump('c');
  if (turn.kind === 'unknown')    bump('u');
  if (turn.kind === 'question')   bump('q');

  scrollDown();
  return displayText.length;
}

function highlightLedger(basis) {
  const bWords = new Set(
    basis.toLowerCase().replace(/[^\w\s]/g,'').split(/\s+/).filter(w => w.length > 4)
  );
  let best = null, bestScore = 0;
  document.querySelectorAll('.ledger-row').forEach(row => {
    const f = row.querySelector('.ledger-fact');
    if (!f) return;
    const fWords = new Set(f.textContent.toLowerCase().replace(/[^\w\s]/g,'').split(/\s+/).filter(w => w.length > 4));
    const score = [...bWords].filter(w => fWords.has(w)).length / Math.max(bWords.size, 1);
    if (score > bestScore) { bestScore = score; best = row; }
  });
  if (best && bestScore > 0.35) {
    document.querySelectorAll('.ledger-row.cited').forEach(r => r.classList.remove('cited'));
    best.classList.add('cited');
    best.scrollIntoView({ behavior:'smooth', block:'nearest' });
  }
}

/* ============================================================
   Briefing renderer
============================================================ */
function renderBriefing(b) {
  document.getElementById('briefPlaceholder')?.remove();
  const content = document.getElementById('briefingsContent');
  const card = document.createElement('div');
  card.className = 'briefing-card';
  const bodyId = 'bf-' + b.id;
  card.innerHTML = `
    <div class="briefing-card-head">
      <div class="briefing-pip" style="background:${b.color}"></div>
      <span class="briefing-role">${esc(b.role)}</span>
      <span class="private-tag">Private</span>
    </div>
    <div class="briefing-body" id="${bodyId}"></div>`;
  content.appendChild(card);
  revealText(document.getElementById(bodyId), b.text, 7);
}

/* ============================================================
   Text reveal
============================================================ */
function revealText(el, text, baseDelay) {
  baseDelay = baseDelay || 12;
  if (!text) { el.textContent = ''; return; }
  el.textContent = '';
  const cursor = document.createElement('span');
  cursor.className = 'cursor-blink';
  el.appendChild(cursor);
  const chars = [...text];
  let i = 0;
  (function tick() {
    if (i >= chars.length) { cursor.remove(); return; }
    const ch = chars[i++];
    el.insertBefore(document.createTextNode(ch), cursor);
    const delay = '.!?'.includes(ch) ? 65 : ch === ',' ? 38 : baseDelay;
    setTimeout(tick, delay / speed);
  })();
}

/* ============================================================
   Replay
============================================================ */
function replay() {
  playing = false;
  setTimeout(() => {
    document.getElementById('transcriptLive').innerHTML = '';
    document.getElementById('briefingsContent').innerHTML = `
      <div class="briefings-placeholder" id="briefPlaceholder">
        <div class="lock-icon">&#128274;</div>
        <div>Sealed until<br>meeting ends</div>
      </div>`;
    document.getElementById('replayBtn').style.display = 'none';
    currentRound = 0;
    counters = {c:0, u:0, q:0};
    ['c','u','q'].forEach(k => document.getElementById('ctr-'+k).textContent = '0');
    document.querySelectorAll('.ledger-row.cited').forEach(r => r.classList.remove('cited'));
    playDemo();
  }, 200);
}

/* ============================================================
   Utilities
============================================================ */
function bump(k) {
  counters[k]++;
  document.getElementById('ctr-'+k).textContent = counters[k];
}
function setStatus(mode, text) {
  document.getElementById('statusDot').className = 'status-dot' + (mode==='live' ? ' live' : '');
  document.getElementById('statusText').textContent = text;
}
function setFoot(msg) { document.getElementById('foot').textContent = msg; }
function scrollDown() {
  const s = document.getElementById('transcriptScroll');
  requestAnimationFrame(() => { s.scrollTop = s.scrollHeight; });
}
function esc(s) {
  return String(s != null ? s : '').replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ============================================================
   Boot
============================================================ */
buildLedger();
playDemo();
</script>
